<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GYMAWY</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a2332">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GYMAWY">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/js/jsqr.min.js"></script>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page" class="login-wrap" style="display:none">
  <div class="login-box">
    <div class="login-logo">🏋️</div>
    <h1 class="login-title">GYMAWY</h1>
    <p class="login-sub" data-i18n="login.subtitle">Sign in to your gym dashboard</p>
    <form id="login-form">
      <div class="form-group">
        <label data-i18n="login.email">Email</label>
        <input type="email" id="login-email" placeholder="owner@gymdesk.com" required>
      </div>
      <div class="form-group">
        <label data-i18n="login.password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <div id="login-error" class="alert alert-error" style="display:none"></div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn" style="margin-top:0.25rem;padding:0.7rem;font-size:0.9rem;border-radius:8px;">
        <span data-i18n="login.signin">Sign In</span>
      </button>
    </form>
    <div class="login-lang">
      <button onclick="App.setLang('en')" class="lang-btn" id="lang-en">EN</button>
      <span style="color:var(--border)">|</span>
      <button onclick="App.setLang('ar')" class="lang-btn" id="lang-ar">AR</button>
    </div>
  </div>
</div>

<!-- SIDEBAR BACKDROP (mobile) -->
<div id="sidebar-backdrop" class="sidebar-backdrop" onclick="App.toggleSidebar()"></div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-badge">🏋️</div>
      <span class="logo-text">GYMAWY</span>
      <button class="sidebar-close" onclick="App.toggleSidebar()">✕</button>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- filled by JS based on role -->
    </nav>
    <div class="sidebar-footer">
      <div class="user-info" id="user-info-sidebar"></div>
      <button class="btn btn-sm sidebar-logout" onclick="App.logout()" data-i18n="nav.logout"
        style="background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);width:100%;border-radius:7px;">
        Sign Out
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-wrap">
    <!-- TOP BAR -->
    <header class="topbar">
      <button class="topbar-menu" onclick="App.toggleSidebar()">☰</button>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-right">
        <div class="lang-toggle">
          <button onclick="App.setLang('en')" class="lang-btn" id="app-lang-en">EN</button>
          <button onclick="App.setLang('ar')" class="lang-btn" id="app-lang-ar">AR</button>
        </div>
        <button id="btn-share-qr" onclick="App.openShareModal()" title="Mobile Access QR"
          style="background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.25rem 0.5rem;cursor:pointer;font-size:1rem;display:none;min-height:34px;min-width:34px;align-items:center;justify-content:center">
          📱
        </button>
        <div class="avatar-wrap">
          <div class="user-avatar" id="user-avatar" onclick="App.toggleUserMenu()">O</div>
          <div class="user-menu" id="user-menu">
            <div class="user-menu-header">
              <strong id="user-menu-name"></strong>
              <span id="user-menu-role"></span>
            </div>
            <button class="user-menu-btn" onclick="App.logout()">🚪 Sign Out</button>
          </div>
        </div>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <main id="page-content" class="page-content">
      <div class="loading-spinner">Loading…</div>
    </main>
  </div>
</div>

<!-- BOTTOM NAV (mobile — built dynamically by App.buildBottomNav) -->
<nav id="bottom-nav" class="bottom-nav" style="display:none">
  <div class="bottom-nav-inner" id="bottom-nav-inner"></div>
</nav>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="Modal.close()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span id="modal-title" class="modal-title"></span>
      <button class="modal-close" onclick="Modal.close()">✕</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/stripe-loader.js"></script>
<script src="/js/app.js"></script>
<script src="/js/pages/dashboard.js"></script>
<script src="/js/pages/members.js"></script>
<script src="/js/pages/subscriptions.js"></script>
<script src="/js/pages/attendance.js"></script>
<script src="/js/pages/payments.js"></script>
<script src="/js/pages/trainers.js"></script>
<script src="/js/pages/classes.js"></script>
<script src="/js/pages/users.js"></script>
<script src="/js/pages/member-portal.js"></script>

<!-- PWA Service Worker Registration -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
